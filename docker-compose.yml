name: bank-etl-p1clone

networks:
  bank_etl_net:
    driver: bridge

volumes:
  postgres_data:
  airflow_logs:

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  networks: [bank_etl_net]
  env_file:
    - .env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__TEST_CONNECTION: Enabled
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    PYTHONPATH: /opt/airflow/bank_etl
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ETL_CSV_DIR: /opt/airflow/bank_etl/CSV
    SPARK_MASTER: ${SPARK_MASTER}
    AIRFLOW_CONN_BANK_POSTGRES: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  volumes:
    - ./:/opt/airflow/bank_etl:ro
    - ${HOST_CSV_DIR:-./CSV}:/opt/airflow/bank_etl/CSV:ro
    - ./dags:/opt/airflow/dags:rw
    - airflow_logs:/opt/airflow/logs

services:
  postgres:
    image: postgres:16-alpine
    networks: [bank_etl_net]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  airflow-init:
    <<: *airflow-common
    user: "0:0"
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-common-env
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        export AIRFLOW_INIT_U="$${_AIRFLOW_WWW_USER_USERNAME:-airflow}"
        export AIRFLOW_INIT_P="$${_AIRFLOW_WWW_USER_PASSWORD:-airflow}"
        mkdir -p /opt/airflow/logs /opt/airflow/dags
        chown -R "$${AIRFLOW_UID:-50000}:0" /opt/airflow/logs /opt/airflow/dags
        runuser -u airflow -- bash -c "airflow db migrate && airflow db check && (airflow users create --username \"$${AIRFLOW_INIT_U}\" --password \"$${AIRFLOW_INIT_P}\" --firstname Admin --lastname User --role Admin --email admin@example.com || true) && airflow connections test bank_postgres"

  airflow-webserver:
    <<: *airflow-common
    user: "${AIRFLOW_UID:-50000}:0"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "${AIRFLOW_WEB_PORT:-8080}:8080"
    command: webserver

  airflow-scheduler:
    <<: *airflow-common
    user: "${AIRFLOW_UID:-50000}:0"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
